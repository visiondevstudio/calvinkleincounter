<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Conversão | Calvin Garten</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #ffffff;
            --secondary-bg: #f5f5f7;
            --text: #1d1d1f;
            --accent: #000000;
            --border: #d2d2d7;
            --danger: #ff3b30;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .logo-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .logo-img { max-width: 180px; height: auto; }
        h1 { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 25px; letter-spacing: -0.5px; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 6px; color: #86868b; text-transform: uppercase; }

        select, input, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
            font-size: 15px; background: var(--bg); box-sizing: border-box; outline: none; transition: border-color 0.2s;
            font-family: inherit;
        }

        select:focus, input:focus, textarea:focus { border-color: var(--accent); }
        input:disabled, select:disabled { background-color: #fbfbfd; color: #a1a1a6; cursor: not-allowed; }

        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-option { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }

        .conditional { display: none; padding-top: 15px; border-top: 1px solid #f5f5f7; margin-top: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilo específico para o campo de observação */
        #campo-outros { margin-top: 12px; display: none; animation: fadeIn 0.3s ease; }

        .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 15px; }
        .btn-secondary { width: 100%; padding: 10px; background: transparent; color: #1d1d1f; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 10px; }
        .btn-danger { width: 100%; background: transparent; color: var(--danger); border: none; font-size: 11px; text-transform: uppercase; font-weight: 600; cursor: pointer; margin-top: 25px; letter-spacing: 0.5px; }

        .main-footer { text-align: center; padding: 20px 0; width: 100%; max-width: 420px; }
        .main-footer p { font-size: 11px; color: #86868b; margin: 4px 0; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 1000px; margin: 20px auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { background: #f5f5f7; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-box span { display: block; font-size: 12px; color: #86868b; margin-bottom: 5px; }
        .stat-box strong { font-size: 20px; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #000; font-size: 11px; text-transform: uppercase; color: #86868b; }
        td { padding: 12px; border-bottom: 1px solid #f5f5f7; }

        .badge { padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 10px; }
        .badge-sim { background: #e3f9e5; color: #1f7a24; }
        .badge-nao { background: #fff1f0; color: #cf1322; }

        .btn-del-unit { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .btn-del-unit:hover { background: var(--danger); color: white; }
        
        .close-btn { background: #000; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="ck2.png" alt="Logo" class="logo-img">
    </div>

    <h1>Fluxo de Vendas</h1>
    
    <div class="field">
        <label>Data</label>
        <input type="text" id="data-atual" disabled>
    </div>

    <div class="field">
        <label>Unidade</label>
        <select id="unidade" onchange="atualizarVendedores()">
            <option value="">Selecione a loja...</option>
            <option value="Beira Mar">Beira Mar</option>
            <option value="Joinville">Joinville</option>
        </select>
    </div>

    <div class="field">
        <label>Vendedor</label>
        <select id="vendedor" disabled>
            <option value="">Selecione a unidade primeiro</option>
        </select>
    </div>

    <div class="field">
        <label>Houve venda?</label>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="venda" value="sim" onclick="toggleFields('sim')"> Sim</label>
            <label class="radio-option"><input type="radio" name="venda" value="nao" onclick="toggleFields('nao')"> Não</label>
        </div>
    </div>

    <div id="se-sim" class="conditional">
        <div class="field">
            <label>Valor da Venda (R$)</label>
            <input type="number" id="valor" placeholder="0.00" step="0.01">
        </div>
    </div>

    <div id="se-nao" class="conditional">
        <div class="field">
            <label>Motivo da Perda</label>
            <select id="motivo" onchange="verificarOutros()">
                <option value="">Selecione...</option>
                <option value="Grade quebrada">Tamanho/Grade</option>
                <option value="Falta de produto">Peça não encontrada</option>
                <option value="Cor/Modelo">Não gostou do modelo</option>
                <option value="Preço">Preço</option>
                <option value="Apenas visitando">Só olhando</option>
                <option value="Outros">Outros (especificar)</option>
            </select>
        </div>
        <div id="campo-outros">
            <label>Observação</label>
            <textarea id="obs-outros" rows="2" placeholder="Descreva o motivo..."></textarea>
        </div>
    </div>

    <button class="btn-primary" onclick="salvar()">REGISTRAR ATENDIMENTO</button>
    <button class="btn-secondary" onclick="abrirVisualizador()">📊 VER RESULTADOS / APAGAR</button>
    <button class="btn-secondary" onclick="exportarExcel()">📥 BAIXAR EXCEL</button>
    
    <button class="btn-danger" onclick="limparTudo()">⚠️ Limpar Histórico do Banco</button>
</div>

<footer class="main-footer">
    <p>&copy; 2026 Adriano Marques. Todos os direitos reservados.</p>
    <p>Sistema de Controle de Fluxo Interno v2.0 (Supabase DB)</p>
</footer>

<div id="modalVisualizador" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Gestão de Registros (Banco de Dados)</h2>
            <button class="close-btn" onclick="fecharVisualizador()">VOLTAR</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span>Faturamento Total</span><strong id="stat-valor">R$ 0,00</strong></div>
            <div class="stat-box"><span>Taxa de Conversão</span><strong id="stat-conversao">0%</strong></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Loja</th>
                        <th>Vendedor</th>
                        <th>Vendeu?</th>
                        <th>Valor</th>
                        <th>Motivo</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO DO SUPABASE ---
    // ⚠️ SUBSTITUA PELOS SEUS DADOS DO PAINEL DO SUPABASE (Settings > API)
    const SUPABASE_URL = 'https://hpnjvlbareiphkasgwfn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_BiLjOhWkRbyQ4g8uhi-hCg_mJ-VdzfK';
    
    // Inicializa o cliente Supabase
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const vendedoresPorUnidade = {
        "Beira Mar": ["Robert", "Amanda", "Leticia"],
        "Joinville": ["Adriano", "Isa", "Kauan","Renato"]
    };

    window.onload = () => { 
        document.getElementById('data-atual').value = new Date().toLocaleDateString('pt-BR'); 
    };

    function atualizarVendedores() {
        const unidade = document.getElementById('unidade').value;
        const selectVendedor = document.getElementById('vendedor');
        selectVendedor.innerHTML = '<option value="">Selecione...</option>';
        if (unidade && vendedoresPorUnidade[unidade]) {
            selectVendedor.disabled = false;
            vendedoresPorUnidade[unidade].forEach(v => {
                const opt = document.createElement('option'); opt.value = v; opt.textContent = v;
                selectVendedor.appendChild(opt);
            });
        } else { selectVendedor.disabled = true; }
    }

    function toggleFields(status) {
        document.getElementById('se-sim').style.display = (status === 'sim') ? 'block' : 'none';
        document.getElementById('se-nao').style.display = (status === 'nao') ? 'block' : 'none';
        if(status === 'sim') verificarOutros(); 
    }

    function verificarOutros() {
        const motivo = document.getElementById('motivo').value;
        const divOutros = document.getElementById('campo-outros');
        divOutros.style.display = (motivo === 'Outros') ? 'block' : 'none';
    }

    // --- NOVA FUNÇÃO SALVAR (SUPABASE) ---
    async function salvar() {
        const unidade = document.getElementById('unidade').value;
        const vendedor = document.getElementById('vendedor').value;
        const vendaRealizada = document.querySelector('input[name="venda"]:checked');
        
        if (!unidade || !vendedor || !vendaRealizada) return alert("Preencha Loja, Vendedor e se houve venda.");

        const converteu = vendaRealizada.value === 'sim';
        let motivoFinal = "";

        if (converteu) {
            motivoFinal = "Venda";
        } else {
            const motivoSel = document.getElementById('motivo').value;
            if (!motivoSel) return alert("Selecione o motivo da perda.");
            
            if (motivoSel === "Outros") {
                const obs = document.getElementById('obs-outros').value.trim();
                if (!obs) return alert("Por favor, descreva o motivo no campo de observação.");
                motivoFinal = "Outros: " + obs;
            } else {
                motivoFinal = motivoSel;
            }
        }

        const valorVenda = parseFloat(document.getElementById('valor').value) || 0;

        // Validação básica: se vendeu, o valor não pode ser zero.
        if (converteu && valorVenda <= 0) {
            return alert("Por favor, insira um valor de venda válido.");
        }

        // Prepara os dados para o Supabase
        const dadosDB = {
            data: document.getElementById('data-atual').value,
            hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            unidade: unidade,
            vendedor: vendedor,
            vendeu: converteu ? "SIM" : "NÃO",
            valor: valorVenda,
            motivo: motivoFinal
        };

        // Envia para o banco de dados
        const { data, error } = await supabase
          .from('vendas')
          .insert([dadosDB]);

        if (error) {
            console.error('Erro Supabase:', error);
            alert("Erro ao salvar no banco de dados: " + error.message);
        } else {
            alert("Registro salvo com sucesso!");
            location.reload(); // Recarrega para limpar o formulário
        }
    }

    // --- NOVA FUNÇÃO VISUALIZAR (SUPABASE) ---
    async function abrirVisualizador() {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "<tr><td colspan='7' style='text-align:center'>Carregando dados...</td></tr>";
        document.getElementById('modalVisualizador').style.display = 'block';

        // Busca dados do Supabase (ordenado pelo mais recente)
        const { data: historico, error } = await supabase
          .from('vendas')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
            console.error('Erro Supabase:', error);
            corpo.innerHTML = `<tr><td colspan='7' style='text-align:center; color:red'>Erro ao carregar: ${error.message}</td></tr>`;
            return;
        }

        corpo.innerHTML = "";
        let totalFaturamento = 0; 
        let totalAtendimentos = historico.length;
        let vendasSim = 0;

        if(totalAtendimentos === 0) {
            corpo.innerHTML = "<tr><td colspan='7' style='text-align:center'>Nenhum registro encontrado no banco.</td></tr>";
        }

        historico.forEach((row) => {
            if(row.vendeu === "SIM") { 
                totalFaturamento += row.valor; 
                vendasSim++; 
            }
            
            // Formatação do valor para Real R$
            const valorFormatado = row.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

            corpo.innerHTML += `
                <tr>
                    <td>${row.data} <br><small>${row.hora}</small></td>
                    <td>${row.unidade}</td>
                    <td>${row.vendedor}</td>
                    <td><span class="badge badge-${row.vendeu.toLowerCase()}">${row.vendeu}</span></td>
                    <td>${valorFormatado}</td>
                    <td style="max-width: 200px; word-wrap: break-word;">${row.motivo}</td>
                    <td>
                        <button class="btn-del-unit" onclick="apagarUnitario('${row.id}')">🗑️</button>
                    </td>
                </tr>`;
        });

        // Atualiza Cards de Estatística
        const faturamentoFormatado = totalFaturamento.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('stat-valor').innerText = faturamentoFormatado;
        
        const txConversao = totalAtendimentos ? `${(vendasSim/totalAtendimentos*100).toFixed(1)}%` : "0%";
        document.getElementById('stat-conversao').innerText = txConversao;
    }

    // --- NOVA FUNÇÃO APAGAR UNITÁRIO (SUPABASE) ---
    async function apagarUnitario(id) {
        if (confirm("Deseja apagar este registro específico permanentemente do banco de dados?")) {
            const { error } = await supabase
              .from('vendas')
              .delete()
              .eq('id', id); // Filtra pelo ID único

            if (error) {
                alert("Erro ao apagar: " + error.message);
            } else {
                abrirVisualizador(); // Atualiza a tabela
            }
        }
    }

    function fecharVisualizador() { document.getElementById('modalVisualizador').style.display = 'none'; }

    // --- NOVA FUNÇÃO EXPORTAR (BUSCA DO SUPABASE PRIMEIRO) ---
    async function exportarExcel() {
        // Busca os dados atuais do banco para garantir que o Excel está atualizado
        const { data: historico, error } = await supabase
          .from('vendas')
          .select('*')
          .order('created_at', { ascending: true });

        if (error || !historico || historico.length === 0) return alert("Não há dados para exportar ou ocorreu um erro.");
        
        // Gera o CSV
        let csv = "data:text/csv;charset=utf-8,\uFEFFData;Hora;Unidade;Vendedor;Vendeu;Valor;Motivo\n";
        historico.forEach(r => {
            // Converte ponto em vírgula para o Excel brasileiro reconhecer como número
            const valorCsv = r.valor.toString().replace('.',',');
            csv += `${r.data};${r.hora};${r.unidade};${r.vendedor};${r.vendeu};${valorCsv};${r.motivo}\n`;
        });
        
        const link = document.createElement("a"); 
        link.href = encodeURI(csv);
        // Nome do arquivo com o mês atual (0-11, então +1)
        link.download = `relatorio_vendas_mes_${new Date().getMonth()+1}.csv`; 
        link.click();
    }

    // --- NOVA FUNÇÃO LIMPAR TUDO (SUPABASE - CUIDADO!) ---
    async function limparTudo() {
        if (confirm("⚠️ ATENÇÃO: Isso apagará TODO o histórico do banco de dados permanentemente. Você tem certeza absoluta?")) {
            
            // No Supabase, para deletar tudo sem filtro, precisamos usar uma gambiarra segura 
            // ou garantir que o RLS permite. O jeito mais fácil é filtrar por algo que sempre existe, 
            // como 'created_at' não ser nulo.
            
            const { error } = await supabase
              .from('vendas')
              .delete()
              .neq('data', ''); // Deleta onde a data não é vazia (ou seja, tudo)

            if (error) {
                console.error('Erro ao limpar banco:', error);
                alert("Erro ao limpar banco de dados. Verifique as permissões de RLS no Supabase. Erro: " + error.message);
            } else {
                alert("Banco de dados limpo com sucesso.");
                location.reload();
            }
        }
    }
</script>
</body>
</html>
